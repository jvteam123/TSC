<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Team Shuffler & Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .team-card {
            border: 1px solid #000;
            min-height: 400px;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .team-header {
            background-color: #f5b942;
            border-bottom: 2px solid #000;
            font-weight: bold;
            display: grid;
            grid-template-columns: 1fr 80px;
        }

        .shift-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .shift-day { background-color: #fef3c7; color: #92400e; }
        .shift-night { background-color: #e0e7ff; color: #3730a3; }

        .sub-header {
            background-color: #4b5563;
            color: white;
            text-transform: uppercase;
            font-size: 0.7rem;
            display: grid;
            grid-template-columns: 1fr 60px 80px;
        }

        .tech-row {
            display: grid;
            grid-template-columns: 1fr 60px 80px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.85rem;
        }

        .tech-row:nth-child(even) {
            background-color: #fafafa;
        }

        .quality-cell {
            border-left: 1px solid #e5e7eb;
            text-align: center;
            font-weight: 600;
        }

        .id-cell {
            border-left: 1px solid #e5e7eb;
            text-align: center;
        }

        .team-footer {
            margin-top: auto;
            border-top: 1px solid #000;
            background: #f9fafb;
            padding: 4px 8px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .btn {
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header Actions -->
        <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 gap-6 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Tech Operations Shuffler</h1>
                <p class="text-gray-500">Shift-Isolated Quality Balancing</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3 w-full xl:w-auto">
                <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200">
                    <button onclick="setShuffleScope('all')" id="scope-all" class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors bg-white shadow-sm text-gray-900">All Shifts</button>
                    <button onclick="setShuffleScope('day')" id="scope-day" class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors text-gray-500 hover:text-gray-700">Day Only</button>
                    <button onclick="setShuffleScope('night')" id="scope-night" class="px-3 py-1.5 rounded-md text-sm font-medium transition-colors text-gray-500 hover:text-gray-700">Night Only</button>
                </div>

                <div class="h-8 w-px bg-gray-200 mx-1 hidden md:block"></div>

                <button onclick="openMemberModal()" class="btn bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    Manage Techs
                </button>
                <button onclick="openTeamModal()" class="btn bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    Setup Teams
                </button>
                <button onclick="shuffleBalanced()" class="btn bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 shadow-lg shadow-orange-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                    SHUFFLE SELECTED
                </button>
            </div>
        </div>

        <!-- Shift Groupings -->
        <div id="day-section" class="mb-10">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-orange-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                Day Shift (Shift 1)
            </h2>
            <div id="teams-container-day" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="night-section">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                Night Shift (Shift 2)
            </h2>
            <div id="teams-container-night" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- Tech Management Modal -->
    <div id="member-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold">Manage Technicians</h2>
                    <p class="text-xs text-gray-500" id="tech-count-display"></p>
                </div>
                <button onclick="closeModals()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div class="p-6 flex-1 overflow-y-auto">
                <div class="flex flex-wrap gap-2 mb-6 p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <input type="text" id="new-name" placeholder="Name" class="flex-1 min-w-[150px] border p-2 rounded">
                    <input type="text" id="new-id" placeholder="ID" class="w-24 border p-2 rounded">
                    <div class="flex items-center gap-2 bg-white px-2 rounded border">
                        <span class="text-xs text-gray-400">Quality:</span>
                        <input type="number" id="new-quality" placeholder="90" min="0" max="100" class="w-16 p-1 text-center font-bold">
                        <span class="text-xs">%</span>
                    </div>
                    <button onclick="addMember()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold">Add Tech</button>
                </div>
                <div id="member-list" class="space-y-2"></div>
            </div>
            <div class="p-4 border-t flex justify-between items-center">
                <button onclick="resetToDefault()" class="text-red-500 text-sm font-medium hover:underline">Reset to Default</button>
                <button onclick="closeModals()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded font-medium">Close</button>
            </div>
        </div>
    </div>

    <!-- Team Setup Modal -->
    <div id="team-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl w-full max-w-md shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">Team Setup</h2>
                <button onclick="closeModals()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div class="p-6">
                <div class="space-y-3 mb-6">
                    <input type="text" id="team-name" placeholder="Team Name (e.g. 63 - Cherrie)" class="w-full border p-2 rounded">
                    <div class="flex gap-2">
                        <select id="team-shift" class="flex-1 border p-2 rounded text-sm bg-gray-50">
                            <option value="day">Day Shift</option>
                            <option value="night">Night Shift</option>
                        </select>
                        <button onclick="addTeam()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold">Add Team</button>
                    </div>
                </div>
                <div id="team-list" class="space-y-2 max-h-60 overflow-y-auto mb-4"></div>
            </div>
            <div class="p-4 border-t text-right">
                <button onclick="closeModals()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded font-medium">Close</button>
            </div>
        </div>
    </div>

    <script>
        const getRandomQuality = () => Math.floor(Math.random() * (100 - 80) + 80);

        const DEFAULT_TECHS = [
            { id: '7092RN', name: 'Romiel Nuevo' }, { id: '7089RR', name: 'Ravin Louis Relador' },
            { id: '7102JD', name: 'John Kenneth Dueñas' }, { id: '7170WS', name: 'Warren Salogaol' },
            { id: '7040JP', name: 'Jose Poro III' }, { id: '7159MC', name: 'Ma. Angelica Cagigas' },
            { id: '7161KA', name: 'Kent C. Agraviador' }, { id: '7168JS', name: 'Jennifer S. Solayao' },
            { id: '7158JD', name: 'Junie S. Dadol' }, { id: '7167AD', name: 'Almer B. Dela Cruz' },
            { id: '7178MD', name: 'Mary Mae Dagwayan' }, { id: '4297RQ', name: 'Ralph B. Quinto' },
            { id: '7086LP', name: 'Lemuel Presbitero' }, { id: '7087LA', name: 'Lorie Mae Año' },

            { id: '7171AL', name: 'Alfe Marie G. Latras' }, { id: '7311JT', name: 'Joseph M. Tabada' },
            { id: '7173ES', name: 'Earl Ryan Y. Santiago' }, { id: '7175JP', name: 'Jumbo S. Paanod Jr.' },
            { id: '7084LQ', name: 'Lowel K. Quilinguen' }, { id: '7044AM', name: 'Anna Mae Mencho A. Macaraya' },
            { id: '4488MD', name: 'Maricris de Gracia' }, { id: '7096AV', name: 'Ale-June Villacencio' },
            { id: '4489EA', name: 'Everly Apurado' }, { id: '7103RE', name: 'Roberto Ebarita Jr.' },
            { id: '7043RP', name: 'Randolf Potot' }, { id: '7093MG', name: 'Michael Allien Getigan' },
            { id: '7166CR', name: 'Carl Anthony Riñen' }, { id: '7090JA', name: 'John Russian Arches' },
            { id: '7165GR', name: 'Ghee Ram N. Racaza' }, { id: '7176CC', name: 'Clarfen D. Campilanan' },
            { id: '7249SS', name: 'Serg Sembrano' }, { id: '7236LE', name: 'Lorens Christopher Ebrado' },
            { id: '4426KV', name: 'Kenneth Lester Villajos' }, { id: '4472JS', name: 'Sison, John Vincent Estopito' },
            { id: '4475JT', name: 'Joana May Taboada' }, { id: '7240HH', name: 'Hyacint Hortelano' },
            { id: '7039NO', name: 'Nazareno Oppus' }, { id: '7231NR', name: 'Negel Roloma' },
            { id: '7244AA', name: 'Arjohn Abapo' }, { id: '7247JA', name: 'Jayson Aliser' },
            { id: '7248AA', name: 'Allan Paul Alforque' }, { id: '7251JD', name: 'Jan Dominic Dela Cruz' },
            { id: '7314VP', name: 'Vince April Pitogo' }, { id: '7042NB', name: 'Nikki Carlos Booc' },
            { id: '7234CS', name: 'Christian Suico' }, { id: '7313MB', name: 'Mark Kg Barong' },
            { id: '7036RB', name: 'Rodrigo Basnillo' }, { id: '7239EO', name: 'Eric Jason Omega' },
            { id: '4477PT', name: 'Pacifico Tejam' }, { id: '7251DJ', name: 'Jan Dominic Dela Cruz' },
            { id: '7233JP', name: 'Jeobenail li Parame' }, { id: '4135RC', name: 'Cantiveros, Ritche Bayo' },
            { id: '7315CR', name: 'Christiane Repunte' }, { id: '7243JC', name: 'John Cañete' },
            { id: '4474HS', name: 'Soroño, Humfrey Dave Viaña' }, { id: '4492CP', name: 'Christian Pontiano' },
            { id: '4421AT', name: 'Anthony Talledo' }, { id: '7237ML', name: 'Michael Bryan Lambo' },
            { id: '4481JV', name: 'Jasmin Villocino' }, { id: '7316NT', name: 'Niel Fred Tabar' },
            { id: '7245SC', name: 'Sergio Cuizon Jr.' }, { id: '4476JR', name: 'Rico, Jefrey Labajo' },
            { id: '7246AJ', name: 'Arvin Jasmin' }, { id: '7241DM', name: 'Dejie Monterde' },
            { id: '4435AC', name: 'Allan Codina' }, { id: '7242FV', name: 'Francis Anthony Villarin' },
            { id: '2274JD', name: 'Jacky Dimla' }
        ].map(t => ({ ...t, quality: getRandomQuality() }));

        let techs = [];
        let teams = [
            { name: "63 - Cherrie", id: "63", shift: "day" },
            { name: "115 - Barbie", id: "115", shift: "day" },
            { name: "57 - Noel", id: "57", shift: "day" },
            { name: "123 - Jeave", id: "123", shift: "night" },
            { name: "114 - Anderson", id: "114", shift: "night" },
            { name: "64 - Ella", id: "64", shift: "night" }
        ];

        let currentAssignments = {};
        let shuffleScope = 'all'; 

        function init() {
            const savedTechs = localStorage.getItem('techs_v4');
            const savedTeams = localStorage.getItem('teams_v4');
            if(savedTechs) techs = JSON.parse(savedTechs);
            else techs = [...DEFAULT_TECHS];
            if(savedTeams) teams = JSON.parse(savedTeams);
            
            // Initial distribution
            distributeInitial();
            renderGrid();
        }

        // Helper to perform initial fair split
        function distributeInitial() {
            const sorted = [...techs].sort((a,b) => b.quality - a.quality);
            const teamCount = teams.length;
            
            teams.forEach(t => currentAssignments[t.name] = []);
            
            sorted.forEach((tech, index) => {
                const teamIndex = index % teamCount;
                currentAssignments[teams[teamIndex].name].push(tech);
            });
        }

        function setShuffleScope(scope) {
            shuffleScope = scope;
            ['all', 'day', 'night'].forEach(s => {
                const btn = document.getElementById(`scope-${s}`);
                if(s === scope) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-gray-900');
                    btn.classList.remove('text-gray-500');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-gray-900');
                    btn.classList.add('text-gray-500');
                }
            });
        }

        function shuffleBalanced() {
            if (!teams.length || !techs.length) return;

            let activeTeams = [];
            let poolToShuffle = [];

            if (shuffleScope === 'all') {
                // Shuffle everyone globally
                activeTeams = [...teams];
                poolToShuffle = [...techs];
            } else {
                // Strict isolation: Only shuffle techs already in the specific shift
                activeTeams = teams.filter(t => t.shift === shuffleScope);
                poolToShuffle = activeTeams.flatMap(t => currentAssignments[t.name] || []);
                
                // Safety check: if pool is empty (no previous assignment), take global tech pool slice
                if (poolToShuffle.length === 0) {
                    poolToShuffle = techs.filter(t => {
                        const isAssignedElsewhere = teams.some(team => 
                            team.shift !== shuffleScope && 
                            (currentAssignments[team.name] || []).some(m => m.id === t.id)
                        );
                        return !isAssignedElsewhere;
                    });
                }
            }

            if (!activeTeams.length || !poolToShuffle.length) return;

            // 1. Calculate dynamic sizes for active teams based on the specific pool size
            const total = poolToShuffle.length;
            const count = activeTeams.length;
            const base = Math.floor(total / count);
            const rem = total % count;
            let sizes = Array(count).fill(base);
            for(let i=0; i<rem; i++) sizes[i]++;
            sizes.sort(() => Math.random() - 0.5);

            const caps = {};
            activeTeams.forEach((t, i) => caps[t.name] = sizes[i]);

            // 2. Clear current assignments for these specific teams
            activeTeams.forEach(t => {
                currentAssignments[t.name] = [];
            });

            // 3. Balanced Greedy Distribution
            const sortedPool = [...poolToShuffle].sort((a, b) => (b.quality - a.quality) || (Math.random() - 0.5));
            const teamStats = {};
            activeTeams.forEach(t => teamStats[t.name] = 0);

            sortedPool.forEach(tech => {
                const available = activeTeams.filter(t => currentAssignments[t.name].length < caps[t.name]);
                if (available.length > 0) {
                    // Pick the team with the lowest current total quality to maintain balance
                    let best = available[0].name;
                    let minQ = Infinity;
                    available.forEach(t => {
                        if (teamStats[t.name] < minQ) {
                            minQ = teamStats[t.name];
                            best = t.name;
                        }
                    });
                    currentAssignments[best].push(tech);
                    teamStats[best] += tech.quality;
                }
            });

            renderGrid();
        }

        function renderGrid() {
            const dayCont = document.getElementById('teams-container-day');
            const nightCont = document.getElementById('teams-container-night');
            dayCont.innerHTML = '';
            nightCont.innerHTML = '';

            teams.forEach(team => {
                const members = currentAssignments[team.name] || [];
                const totalQuality = members.reduce((sum, m) => sum + m.quality, 0);
                const avgQuality = members.length ? (totalQuality / members.length).toFixed(1) : 0;
                
                const card = document.createElement('div');
                card.className = 'team-card shadow-sm hover:shadow-md transition-shadow';
                
                let membersHtml = members.map(m => `
                    <div class="tech-row">
                        <div class="px-3 py-1 text-gray-700 truncate font-medium">${m.name}</div>
                        <div class="quality-cell px-2 py-1 text-blue-600">${m.quality}%</div>
                        <div class="id-cell px-2 py-1 text-xs text-gray-400 flex items-center justify-center">${m.id}</div>
                    </div>
                `).join('');

                const maxDisplay = 14; 
                const emptyCount = Math.max(0, maxDisplay - members.length);
                for(let i = 0; i < emptyCount; i++) {
                    membersHtml += `<div class="tech-row opacity-10"><div class="px-3 py-1 text-transparent">-</div><div class="quality-cell px-2 py-1">-</div><div class="id-cell px-2 py-1">-</div></div>`;
                }

                card.innerHTML = `
                    <div class="team-header">
                        <div class="p-2 border-r border-black flex flex-col justify-center">
                            <span class="text-xs opacity-70 uppercase tracking-tighter">Team</span>
                            <span class="text-sm truncate">${team.name}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center italic text-[10px]">
                            <span class="shift-badge ${team.shift === 'day' ? 'shift-day' : 'shift-night'}">${team.shift}</span>
                            ID: ${team.id}
                        </div>
                    </div>
                    <div class="sub-header">
                        <div class="px-3 py-1 flex items-center justify-center">Name</div>
                        <div class="flex items-center justify-center border-l border-white/20">Qual</div>
                        <div class="flex items-center justify-center border-l border-white/20">ID</div>
                    </div>
                    <div class="bg-white flex-1">${membersHtml}</div>
                    <div class="team-footer">
                        <span>Avg: ${avgQuality}%</span>
                        <span class="bg-gray-800 text-white px-2 rounded">Size: ${members.length}</span>
                    </div>
                `;

                if(team.shift === 'day') dayCont.appendChild(card);
                else nightCont.appendChild(card);
            });
        }

        function openMemberModal() {
            document.getElementById('member-modal').classList.remove('hidden');
            renderMemberList();
        }

        function openTeamModal() {
            document.getElementById('team-modal').classList.remove('hidden');
            renderTeamList();
        }

        function closeModals() {
            document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));
        }

        function renderMemberList() {
            const list = document.getElementById('member-list');
            document.getElementById('tech-count-display').innerText = `Total: ${techs.length} Technicians`;
            const displayList = [...techs].sort((a, b) => a.name.localeCompare(b.name));
            list.innerHTML = displayList.map((m, i) => `
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded border group">
                    <div class="flex items-center gap-4 flex-1">
                        <span class="w-6 text-[10px] text-gray-400 font-mono">#${i+1}</span>
                        <div class="flex flex-col">
                            <span class="text-gray-800 font-semibold">${m.name}</span>
                            <span class="text-[10px] text-gray-400 font-mono">${m.id}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-1">
                            <input type="number" value="${m.quality}" 
                                onchange="updateQuality('${m.id}', this.value)"
                                class="w-12 text-right border-b border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none bg-transparent font-bold text-blue-600">
                            <span class="text-xs text-gray-400">%</span>
                        </div>
                        <button onclick="removeMember('${m.id}')" class="text-gray-300 hover:text-red-500 transition-colors p-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateQuality(id, val) {
            const num = parseInt(val);
            if(isNaN(num)) return;
            const tech = techs.find(t => t.id === id);
            if(tech) {
                tech.quality = Math.min(100, Math.max(0, num));
                saveData();
            }
        }

        function addMember() {
            const name = document.getElementById('new-name').value.trim();
            const id = document.getElementById('new-id').value.trim();
            let quality = parseInt(document.getElementById('new-quality').value);
            if(!name || !id) return;
            if(isNaN(quality)) quality = getRandomQuality();
            techs.push({ name, id, quality: Math.min(100, Math.max(0, quality)) });
            saveData();
            document.getElementById('new-name').value = '';
            document.getElementById('new-id').value = '';
            document.getElementById('new-quality').value = '';
            renderMemberList();
        }

        function removeMember(id) {
            techs = techs.filter(t => t.id !== id);
            saveData();
            renderMemberList();
        }

        function resetToDefault() {
            if(confirm("Reset to default?")) {
                techs = [...DEFAULT_TECHS].map(t => ({...t, quality: getRandomQuality()}));
                distributeInitial();
                saveData();
                renderMemberList();
                renderGrid();
            }
        }

        function renderTeamList() {
            const list = document.getElementById('team-list');
            list.innerHTML = teams.map((t, i) => `
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded border">
                    <div>
                        <span class="shift-badge ${t.shift === 'day' ? 'shift-day' : 'shift-night'} text-[9px] mr-2">${t.shift}</span>
                        <span class="font-bold text-gray-700">${t.name}</span>
                    </div>
                    <button onclick="removeTeam(${i})" class="text-gray-300 hover:text-red-500 transition-colors p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                </div>
            `).join('');
        }

        function addTeam() {
            const name = document.getElementById('team-name').value.trim();
            const shift = document.getElementById('team-shift').value;
            if(!name) return;
            const id = name.includes('-') ? name.split('-')[0].trim() : name.substring(0,3);
            teams.push({ name, id, shift });
            if(!currentAssignments[name]) currentAssignments[name] = [];
            saveData();
            document.getElementById('team-name').value = '';
            renderTeamList();
            renderGrid();
        }

        function removeTeam(index) {
            const team = teams[index];
            delete currentAssignments[team.name];
            teams.splice(index, 1);
            saveData();
            renderTeamList();
            renderGrid();
        }

        function saveData() {
            localStorage.setItem('techs_v4', JSON.stringify(techs));
            localStorage.setItem('teams_v4', JSON.stringify(teams));
        }

        window.onload = init;
    </script>
</body>
</html>
