<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Team Shuffler & Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .team-card {
            border: 1px solid #000;
            min-height: 400px;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .team-header {
            background-color: #f5b942;
            border-bottom: 2px solid #000;
            font-weight: bold;
            display: grid;
            grid-template-columns: 1fr 80px;
        }

        .sub-header {
            background-color: #4b5563;
            color: white;
            text-transform: uppercase;
            font-size: 0.7rem;
            display: grid;
            grid-template-columns: 1fr 60px 80px;
        }

        .tech-row {
            display: grid;
            grid-template-columns: 1fr 60px 80px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.85rem;
        }

        .tech-row:nth-child(even) {
            background-color: #fafafa;
        }

        .id-cell {
            border-left: 1px solid #e5e7eb;
            text-align: center;
        }

        .quality-cell {
            border-left: 1px solid #e5e7eb;
            text-align: center;
            font-weight: 600;
        }

        .team-footer {
            margin-top: auto;
            border-top: 1px solid #000;
            background: #f9fafb;
            padding: 4px 8px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .btn {
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header Actions -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Tech Operations Shuffler</h1>
                <p class="text-gray-500">Quality Balanced & Dynamic Team Sizes</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="openMemberModal()" class="btn bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="16" y1="11" x2="22" y2="11"/></svg>
                    Manage Techs
                </button>
                <button onclick="openTeamModal()" class="btn bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
                    Setup Teams
                </button>
                <button onclick="shuffleBalanced()" class="btn bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 shadow-lg shadow-orange-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v16Z"/><path d="M6 12h12"/><path d="M6 16h12"/><path d="M6 8h12"/></svg>
                    SHUFFLE EVERYTHING
                </button>
            </div>
        </div>

        <!-- Teams Grid -->
        <div id="teams-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Team cards will be injected here -->
        </div>
    </div>

    <!-- Modals -->
    <div id="member-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl w-full max-w-3xl max-h-[90vh] flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold">Manage Technicians</h2>
                    <p class="text-xs text-gray-500" id="tech-count-display"></p>
                </div>
                <button onclick="closeModals()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div class="p-6 flex-1 overflow-y-auto">
                <div class="flex flex-wrap gap-2 mb-6 p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <input type="text" id="new-name" placeholder="Name" class="flex-1 min-w-[150px] border p-2 rounded">
                    <input type="text" id="new-id" placeholder="ID" class="w-24 border p-2 rounded">
                    <div class="flex items-center gap-2 bg-white px-2 rounded border">
                        <span class="text-xs text-gray-400">Quality:</span>
                        <input type="number" id="new-quality" placeholder="90" min="0" max="100" class="w-16 p-1 text-center font-bold">
                        <span class="text-xs">%</span>
                    </div>
                    <button onclick="addMember()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold">Add Tech</button>
                </div>
                <div id="member-list" class="space-y-2"></div>
            </div>
            <div class="p-4 border-t flex justify-between items-center">
                <button onclick="resetToDefault()" class="text-red-500 text-sm font-medium hover:underline">Reset to Default List</button>
                <button onclick="closeModals()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded font-medium">Close</button>
            </div>
        </div>
    </div>

    <div id="team-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl w-full max-w-md shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">Team Setup</h2>
                <button onclick="closeModals()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div class="p-6">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="team-name" placeholder="Team Name" class="flex-1 border p-2 rounded">
                    <button onclick="addTeam()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-bold">+</button>
                </div>
                <div id="team-list" class="space-y-2 max-h-60 overflow-y-auto mb-4"></div>
            </div>
            <div class="p-4 border-t text-right">
                <button onclick="closeModals()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded font-medium">Close</button>
            </div>
        </div>
    </div>

    <script>
        const getRandomQuality = () => Math.floor(Math.random() * (100 - 80) + 80);

        const DEFAULT_TECHS = [
            { id: '7092RN', name: 'Romiel Nuevo' }, { id: '7089RR', name: 'Ravin Louis Relador' },
            { id: '7102JD', name: 'John Kenneth Dueñas' }, { id: '7170WS', name: 'Warren Salogaol' },
            { id: '7040JP', name: 'Jose Poro III' }, { id: '7159MC', name: 'Ma. Angelica Cagigas' },
            { id: '7161KA', name: 'Kent C. Agraviador' }, { id: '7168JS', name: 'Jennifer S. Solayao' },
            { id: '7158JD', name: 'Junie S. Dadol' }, { id: '7167AD', name: 'Almer B. Dela Cruz' },
            { id: '7178MD', name: 'Mary Mae Dagwayan' }, { id: '4297RQ', name: 'Ralph B. Quinto' },
            { id: '7086LP', name: 'Lemuel Presbitero' }, { id: '7087LA', name: 'Lorie Mae Año' },
            { id: '7088MA', name: 'Michelle Marie D. Alburo' }, { id: '7099SS', name: 'Sallemie Solon' },
            { id: '7171AL', name: 'Alfe Marie G. Latras' }, { id: '7311JT', name: 'Joseph M. Tabada' },
            { id: '7173ES', name: 'Earl Ryan Y. Santiago' }, { id: '7175JP', name: 'Jumbo S. Paanod Jr.' },
            { id: '7084LQ', name: 'Lowel K. Quilinguen' }, { id: '7044AM', name: 'Anna Mae Mencho A. Macaraya' },
            { id: '4488MD', name: 'Maricris de Gracia' }, { id: '7096AV', name: 'Ale-June Villacencio' },
            { id: '4489EA', name: 'Everly Apurado' }, { id: '7103RE', name: 'Roberto Ebarita Jr.' },
            { id: '7043RP', name: 'Randolf Potot' }, { id: '7093MG', name: 'Michael Allien Getigan' },
            { id: '7166CR', name: 'Carl Anthony Riñen' }, { id: '7090JA', name: 'John Russian Arches' },
            { id: '7165GR', name: 'Ghee Ram N. Racaza' }, { id: '7176CC', name: 'Clarfen D. Campilanan' },
            { id: '7249SS', name: 'Serg Sembrano' }, { id: '7236LE', name: 'Lorens Christopher Ebrado' },
            { id: '4426KV', name: 'Kenneth Lester Villajos' }, { id: '4472JS', name: 'Sison, John Vincent Estopito' },
            { id: '4475JT', name: 'Joana May Taboada' }, { id: '7240HH', name: 'Hyacint Hortelano' },
            { id: '7039NO', name: 'Nazareno Oppus' }, { id: '7231NR', name: 'Negel Roloma' },
            { id: '7244AA', name: 'Arjohn Abapo' }, { id: '7247JA', name: 'Jayson Aliser' },
            { id: '7248AA', name: 'Allan Paul Alforque' }, { id: '7251JD', name: 'Jan Dominic Dela Cruz' },
            { id: '7314VP', name: 'Vince April Pitogo' }, { id: '7042NB', name: 'Nikki Carlos Booc' },
            { id: '7234CS', name: 'Christian Suico' }, { id: '7313MB', name: 'Mark Kg Barong' },
            { id: '7036RB', name: 'Rodrigo Basnillo' }, { id: '7239EO', name: 'Eric Jason Omega' },
            { id: '4477PT', name: 'Pacifico Tejam' }, { id: '7251DJ', name: 'Jan Dominic Dela Cruz' },
            { id: '7233JP', name: 'Jeobenail li Parame' }, { id: '4135RC', name: 'Cantiveros, Ritche Bayo' },
            { id: '7315CR', name: 'Christiane Repunte' }, { id: '7243JC', name: 'John Cañete' },
            { id: '4474HS', name: 'Soroño, Humfrey Dave Viaña' }, { id: '4492CP', name: 'Christian Pontiano' },
            { id: '4421AT', name: 'Anthony Talledo' }, { id: '7237ML', name: 'Michael Bryan Lambo' },
            { id: '4481JV', name: 'Jasmin Villocino' }, { id: '7316NT', name: 'Niel Fred Tabar' },
            { id: '7245SC', name: 'Sergio Cuizon Jr.' }, { id: '4476JR', name: 'Rico, Jefrey Labajo' },
            { id: '7246AJ', name: 'Arvin Jasmin' }, { id: '7241DM', name: 'Dejie Monterde' },
            { id: '4435AC', name: 'Allan Codina' }, { id: '7242FV', name: 'Francis Anthony Villarin' },
            { id: '2274JD', name: 'Jacky Dimla' }
        ].map(t => ({ ...t, quality: getRandomQuality() }));

        let techs = [];
        let teams = [
            { name: "63 - Cherrie", id: "63" }, { name: "115 - Barbie", id: "115" },
            { name: "57 - Noel", id: "57" }, { name: "123 - Jeave", id: "123" },
            { name: "114 - Anderson", id: "114" }, { name: "64 - Ella", id: "64" }
        ];

        let currentAssignments = {};

        function init() {
            const savedTechs = localStorage.getItem('techs_v2');
            const savedTeams = localStorage.getItem('teams');
            if(savedTechs) techs = JSON.parse(savedTechs);
            else techs = [...DEFAULT_TECHS];
            if(savedTeams) teams = JSON.parse(savedTeams);
            shuffleBalanced();
        }

        /**
         * Shuffles team member sizes and quality distribution
         */
        function shuffleBalanced() {
            if (!teams.length || !techs.length) return;

            // 1. Determine dynamic team sizes
            // We calculate a base size and then randomly distribute the remainder
            const totalTechs = techs.length;
            const numTeams = teams.length;
            const baseSize = Math.floor(totalTechs / numTeams);
            const remainder = totalTechs % numTeams;

            // Create a size map [baseSize, baseSize+1, etc.] and shuffle it
            let targetSizes = Array(numTeams).fill(baseSize);
            for(let i = 0; i < remainder; i++) targetSizes[i]++;
            targetSizes.sort(() => Math.random() - 0.5);

            const teamCapacities = {};
            teams.forEach((t, i) => teamCapacities[t.name] = targetSizes[i]);

            // 2. Distribute techs by quality into the predefined sizes
            const sortedTechs = [...techs].sort((a, b) => (b.quality - a.quality) || (Math.random() - 0.5));
            
            currentAssignments = {};
            const teamCurrentStats = {};
            teams.forEach(t => {
                currentAssignments[t.name] = [];
                teamCurrentStats[t.name] = 0;
            });

            sortedTechs.forEach(tech => {
                // Find teams that still have capacity
                const availableTeams = teams.filter(t => currentAssignments[t.name].length < teamCapacities[t.name]);
                
                if (availableTeams.length > 0) {
                    // Among available teams, pick the one with the lowest total quality
                    let bestTeam = availableTeams[0].name;
                    let minQualitySum = Infinity;

                    availableTeams.forEach(t => {
                        if (teamCurrentStats[t.name] < minQualitySum) {
                            minQualitySum = teamCurrentStats[t.name];
                            bestTeam = t.name;
                        }
                    });

                    currentAssignments[bestTeam].push(tech);
                    teamCurrentStats[bestTeam] += tech.quality;
                }
            });

            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('teams-container');
            container.innerHTML = '';

            teams.forEach(team => {
                const members = currentAssignments[team.name] || [];
                const totalQuality = members.reduce((sum, m) => sum + m.quality, 0);
                const avgQuality = members.length ? (totalQuality / members.length).toFixed(1) : 0;
                
                const card = document.createElement('div');
                card.className = 'team-card shadow-sm hover:shadow-md transition-shadow';
                
                let membersHtml = members.map(m => `
                    <div class="tech-row">
                        <div class="px-3 py-1 text-gray-700 truncate font-medium">${m.name}</div>
                        <div class="quality-cell px-2 py-1 text-blue-600">${m.quality}%</div>
                        <div class="id-cell px-2 py-1 text-xs text-gray-400 flex items-center justify-center">${m.id}</div>
                    </div>
                `).join('');

                // Fixed UI aesthetic: keep grid rows consistent but visually indicate empty
                const maxDisplay = 14; 
                const emptyCount = Math.max(0, maxDisplay - members.length);
                for(let i = 0; i < emptyCount; i++) {
                    membersHtml += `
                        <div class="tech-row opacity-20">
                            <div class="px-3 py-1 text-transparent">-</div>
                            <div class="quality-cell px-2 py-1">-</div>
                            <div class="id-cell px-2 py-1">-</div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="team-header">
                        <div class="p-2 border-r border-black flex items-center justify-center text-sm">${team.name}</div>
                        <div class="flex items-center justify-center italic text-xs">ID: ${team.id}</div>
                    </div>
                    <div class="sub-header">
                        <div class="px-3 py-1 flex items-center justify-center">Name</div>
                        <div class="flex items-center justify-center border-l border-white/20">Qual</div>
                        <div class="flex items-center justify-center border-l border-white/20">ID</div>
                    </div>
                    <div class="bg-white flex-1">${membersHtml}</div>
                    <div class="team-footer">
                        <span>Avg Qual: ${avgQuality}%</span>
                        <span class="bg-gray-800 text-white px-2 rounded">Size: ${members.length}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openMemberModal() {
            document.getElementById('member-modal').classList.remove('hidden');
            renderMemberList();
        }

        function openTeamModal() {
            document.getElementById('team-modal').classList.remove('hidden');
            renderTeamList();
        }

        function closeModals() {
            document.querySelectorAll('.fixed').forEach(m => m.classList.add('hidden'));
        }

        function renderMemberList() {
            const list = document.getElementById('member-list');
            document.getElementById('tech-count-display').innerText = `Total: ${techs.length} Technicians`;
            const displayList = [...techs].sort((a, b) => a.name.localeCompare(b.name));
            list.innerHTML = displayList.map((m, i) => `
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded border group">
                    <div class="flex items-center gap-4 flex-1">
                        <span class="w-6 text-[10px] text-gray-400 font-mono">#${i+1}</span>
                        <div class="flex flex-col">
                            <span class="text-gray-800 font-semibold">${m.name}</span>
                            <span class="text-[10px] text-gray-400 font-mono">${m.id}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex flex-col items-end">
                            <div class="flex items-center gap-1">
                                <input type="number" value="${m.quality}" 
                                    onchange="updateQuality('${m.id}', this.value)"
                                    class="w-12 text-right border-b border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none bg-transparent font-bold text-blue-600">
                                <span class="text-xs text-gray-400">%</span>
                            </div>
                        </div>
                        <button onclick="removeMember('${m.id}')" class="text-gray-300 hover:text-red-500 transition-colors p-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateQuality(id, val) {
            const num = parseInt(val);
            if(isNaN(num)) return;
            const tech = techs.find(t => t.id === id);
            if(tech) {
                tech.quality = Math.min(100, Math.max(0, num));
                saveAndRefresh();
            }
        }

        function addMember() {
            const name = document.getElementById('new-name').value.trim();
            const id = document.getElementById('new-id').value.trim();
            let quality = parseInt(document.getElementById('new-quality').value);
            if(!name || !id) return showToast("Please fill Name and ID");
            if(isNaN(quality)) quality = getRandomQuality();
            techs.push({ name, id, quality: Math.min(100, Math.max(0, quality)) });
            saveAndRefresh();
            document.getElementById('new-name').value = '';
            document.getElementById('new-id').value = '';
            document.getElementById('new-quality').value = '';
            renderMemberList();
        }

        function removeMember(id) {
            techs = techs.filter(t => t.id !== id);
            saveAndRefresh();
            renderMemberList();
        }

        function resetToDefault() {
            if(confirm("Reset to default technician list?")) {
                techs = [...DEFAULT_TECHS].map(t => ({...t, quality: getRandomQuality()}));
                saveAndRefresh();
                renderMemberList();
            }
        }

        function renderTeamList() {
            const list = document.getElementById('team-list');
            list.innerHTML = teams.map((t, i) => `
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded border">
                    <div>
                        <span class="font-bold text-gray-700">${t.name}</span>
                        <span class="text-xs text-gray-400 ml-2">ID: ${t.id}</span>
                    </div>
                    <button onclick="removeTeam(${i})" class="text-gray-300 hover:text-red-500 transition-colors p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                </div>
            `).join('');
        }

        function addTeam() {
            const name = document.getElementById('team-name').value.trim();
            if(!name) return;
            const id = name.includes('-') ? name.split('-')[0].trim() : name.substring(0,3);
            teams.push({ name, id });
            saveAndRefresh();
            document.getElementById('team-name').value = '';
            renderTeamList();
            shuffleBalanced();
        }

        function removeTeam(index) {
            teams.splice(index, 1);
            saveAndRefresh();
            renderTeamList();
            shuffleBalanced();
        }

        function saveAndRefresh() {
            localStorage.setItem('techs_v2', JSON.stringify(techs));
            localStorage.setItem('teams', JSON.stringify(teams));
            renderGrid();
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'fixed bottom-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-sm z-[100] shadow-xl';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
