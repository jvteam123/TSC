<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        :root {
            --brand-primary: #f59e0b;
            --brand-dark: #111827;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .team-card {
            border: 1px solid #000;
            min-height: 580px;
            background: white;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .team-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
        }

        .team-header {
            background-color: var(--brand-primary);
            border-bottom: 2px solid #000;
            font-weight: 800;
            display: grid;
            grid-template-columns: 1fr 85px;
        }

        .shift-badge {
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 99px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .shift-day { background-color: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        .shift-night { background-color: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe; }

        .sub-header {
            background-color: #1e293b;
            color: white;
            text-transform: uppercase;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            display: grid;
            grid-template-columns: 1fr 80px;
        }

        .tech-row {
            display: grid;
            grid-template-columns: 1fr 80px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 12px;
        }

        .tech-row.pinned-tech {
            background-color: #fffbeb;
            border-left: 3px solid var(--brand-primary);
        }

        .tech-row:last-child { border-bottom: none; }
        .tech-row:nth-child(even):not(.pinned-tech) { background-color: #f8fafc; }

        .id-cell {
            border-left: 1px solid #f1f5f9;
            text-align: center;
            font-family: 'ui-monospace', monospace;
            color: #64748b;
        }

        .team-footer {
            margin-top: auto;
            border-top: 2px solid #000;
            background: #fff;
            padding: 12px;
        }

        #toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
        }

        .toast {
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideIn {
            from { transform: translateY(120%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .balance-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>

            { id: '7242FV', name: 'Francis Anthony Villarin', defaultTeam: '64', shift: 'night', quality: 80, production: 100, pinned: false },
            { id: '2274JD', name: 'Jacky Dimla', defaultTeam: '64', shift: 'night', quality: 85, production: 100, pinned: false }
        ];

        let techs = [];
        let teams = [];
        let currentAssignments = {};
        let shuffleScope = 'all';
        let shuffleHistory = [];

        function init() {
            const savedTechs = localStorage.getItem('tech_ops_v1_staff');
            const savedTeams = localStorage.getItem('tech_ops_v1_teams');
            const savedHistory = localStorage.getItem('tech_ops_v1_history');
            
            techs = savedTechs ? JSON.parse(savedTechs) : [...INITIAL_TECHS];
            teams = savedTeams ? JSON.parse(savedTeams) : [...INITIAL_TEAMS];
            shuffleHistory = savedHistory ? JSON.parse(savedHistory) : [];
            
            resetToDefault();
            renderGrid();
            renderLog();
        }

        // CORE LOGIC: BALANCED SHUFFLE
        function shuffleBalanced() {
            if (teams.length === 0) return showToast("No teams found", "error");
            
            const logDetails = [];
            if (shuffleScope === 'all' || shuffleScope === 'day') {
                performShiftShuffle('day');
                logDetails.push('Day');
            }
            if (shuffleScope === 'all' || shuffleScope === 'night') {
                performShiftShuffle('night');
                logDetails.push('Night');
            }

            // Snapshot for log
            const snapshot = teams.map(team => {
                const m = currentAssignments[team.id] || [];
                const power = m.reduce((s, x) => s + (x.quality * (x.production / 100)), 0);
                const shiftAvg = getShiftMetrics(team.shift).powerAvg;
                const ratio = shiftAvg > 0 ? (power / shiftAvg) * 100 : 100;
                return { name: team.name, balance: ratio.toFixed(1) + '%' };
            });

            shuffleHistory.unshift({
                time: new Date().toLocaleTimeString(),
                scope: shuffleScope.toUpperCase(),
                details: logDetails.join(' & '),
                stats: snapshot
            });

            saveData();
            renderGrid();
            renderLog();
            showToast("Resource Counts Balanced Successfully");
        }

        function performShiftShuffle(shift) {
            const shiftTeams = teams.filter(t => t.shift === shift);
            const allShiftTechs = techs.filter(t => t.shift === shift);
            if (!shiftTeams.length || !allShiftTechs.length) return;

            const assignments = {};
            const teamPowerScores = {};
            
            // 1. Assign Pinned first
            shiftTeams.forEach(t => {
                assignments[t.id] = allShiftTechs.filter(tech => tech.pinned && tech.defaultTeam === t.id);
                teamPowerScores[t.id] = assignments[t.id].reduce((sum, tech) => sum + (tech.quality * (tech.production / 100)), 0);
            });

            // 2. Pool remaining
            const pool = allShiftTechs.filter(tech => !tech.pinned)
                .sort((a,b) => ((b.quality * (b.production/100)) - (a.quality * (a.production/100))) || (Math.random() - 0.5));

            // 3. Define Team Headcount Capacity (Strict Balance)
            const targetSize = Math.floor(allShiftTechs.length / shiftTeams.length);
            const remainder = allShiftTechs.length % shiftTeams.length;
            const teamCaps = {};
            
            shiftTeams.forEach((t, i) => {
                teamCaps[t.id] = targetSize + (i < remainder ? 1 : 0);
            });

            // 4. Distribute pool to teams with capacity, prioritizing lower power
            pool.forEach(tech => {
                const availableTeams = shiftTeams.filter(t => assignments[t.id].length < teamCaps[t.id]);
                if(availableTeams.length) {
                    availableTeams.sort((a,b) => teamPowerScores[a.id] - teamPowerScores[b.id]);
                    const bestTeamId = availableTeams[0].id;
                    assignments[bestTeamId].push(tech);
                    teamPowerScores[bestTeamId] += (tech.quality * (tech.production / 100));
                }
            });

            shiftTeams.forEach(t => currentAssignments[t.id] = assignments[t.id]);
        }

        // HELPERS
        function getShiftMetrics(shift) {
            const shiftTeams = teams.filter(t => t.shift === shift);
            const shiftTechs = techs.filter(t => t.shift === shift);
            const totalPower = shiftTechs.reduce((a, b) => a + (b.quality * (b.production / 100)), 0);
            return {
                powerAvg: totalPower / (shiftTeams.length || 1),
                count: shiftTechs.length,
                teamCount: shiftTeams.length
            };
        }

        function resetToDefault() {
            currentAssignments = {};
            teams.forEach(t => currentAssignments[t.id] = []);
            techs.forEach(tech => {
                if(currentAssignments[tech.defaultTeam]) {
                    currentAssignments[tech.defaultTeam].push(tech);
                } else {
                    // Fallback for orphaned techs
                    const fallback = teams.find(t => t.shift === tech.shift);
                    if(fallback) currentAssignments[fallback.id].push(tech);
                }
            });
        }

        function togglePin(techId) {
            const tech = techs.find(t => t.id === techId);
            if(tech) {
                tech.pinned = !tech.pinned;
                for(const teamId in currentAssignments) {
                    if(currentAssignments[teamId].some(m => m.id === techId)) {
                        tech.defaultTeam = teamId;
                        break;
                    }
                }
                saveData();
                renderGrid();
                showToast(tech.pinned ? "Resource Pinned to Unit" : "Resource Unpinned");
            }
        }

        function factoryReset() {
            if(confirm("DANGER: Wiping all custom configurations. Reverting to original staff list. Proceed?")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        function saveData() {
            localStorage.setItem('tech_ops_v1_staff', JSON.stringify(techs));
            localStorage.setItem('tech_ops_v1_teams', JSON.stringify(teams));
            localStorage.setItem('tech_ops_v1_history', JSON.stringify(shuffleHistory));
        }

        // UI RENDERING
        function renderGrid() {
            const dayCont = document.getElementById('teams-container-day');
            const nightCont = document.getElementById('teams-container-night');
            dayCont.innerHTML = ''; nightCont.innerHTML = '';

            const dayMetrics = getShiftMetrics('day');
            const nightMetrics = getShiftMetrics('night');

            document.getElementById('day-summary').textContent = `${dayMetrics.count} STAFF / ${dayMetrics.teamCount} UNITS`;
            document.getElementById('night-summary').textContent = `${nightMetrics.count} STAFF / ${nightMetrics.teamCount} UNITS`;

            teams.forEach(team => {
                const members = currentAssignments[team.id] || [];
                const powerSum = members.reduce((sum, m) => sum + (m.quality * (m.production / 100)), 0);
                const shiftAvg = (team.shift === 'day' ? dayMetrics : nightMetrics).powerAvg;
                const ratio = shiftAvg > 0 ? (powerSum / shiftAvg) * 100 : 100;
                
                let balanceColor = 'bg-slate-300';
                let textColor = 'text-slate-800';
                if(ratio < 95) { balanceColor = 'bg-red-500'; textColor = 'text-red-600'; }
                if(ratio > 105) { balanceColor = 'bg-green-500'; textColor = 'text-green-600'; }

                const card = document.createElement('div');
                card.className = 'team-card shadow-sm';
                card.innerHTML = `
                    <div class="team-header">
                        <div class="p-3 border-r border-black flex flex-col justify-center">
                            <span class="text-sm truncate uppercase font-bold">${team.name}</span>
                        </div>
                        <div class="flex flex-col items-center justify-center p-2">
                            <span class="shift-badge ${team.shift === 'day' ? 'shift-day' : 'shift-night'} mb-1">${team.shift}</span>
                            <span class="text-[9px] font-black opacity-50">ID:${team.id}</span>
                        </div>
                    </div>
                    <div class="sub-header">
                        <div class="px-3 py-1.5">MEMBER</div>
                        <div class="text-center border-l border-white/10">TECH ID</div>
                    </div>
                    <div class="bg-white flex-1 overflow-hidden">
                        ${members.map(m => `
                            <div class="tech-row ${m.pinned ? 'pinned-tech' : ''}">
                                <div class="px-3 py-2 text-slate-700 truncate font-semibold flex items-center gap-2">
                                    <button onclick="togglePin('${m.id}')" class="${m.pinned ? 'text-amber-500' : 'text-slate-200 hover:text-amber-300'}">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 12V4H17V2H7V4H8V12L6 14V16H11V22H13V16H18V14L16 12Z"/></svg>
                                    </button>
                                    <span class="truncate">${m.name}</span>
                                </div>
                                <div class="id-cell px-2 py-2 text-[10px] flex items-center justify-center">${m.id}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="team-footer">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Power Balance</span>
                            <div class="flex items-center gap-1.5">
                                <span class="balance-indicator ${balanceColor}"></span>
                                <span class="text-[10px] font-black ${textColor}">${ratio.toFixed(1)}%</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-end border-t border-slate-100 pt-3">
                             <div class="flex flex-col">
                                <span class="text-[8px] text-slate-400 font-bold uppercase">Resource Count</span>
                                <span class="text-xs font-black text-slate-800">${members.length} Techs</span>
                             </div>
                             <div class="flex flex-col items-end">
                                <span class="text-[8px] text-slate-400 font-bold uppercase">Unit Power</span>
                                <span class="text-xs font-black text-slate-800">${powerSum.toFixed(0)} pts</span>
                             </div>
                        </div>
                    </div>`;
                
                if(team.shift === 'day') dayCont.appendChild(card);
                else nightCont.appendChild(card);
            });
        }

        function renderLog() {
            const logEl = document.getElementById('shuffle-log');
            if(!shuffleHistory.length) {
                logEl.innerHTML = `<div class="p-12 text-center text-slate-300 italic text-sm">No recent shuffle data.</div>`;
                return;
            }
            logEl.innerHTML = shuffleHistory.map(entry => `
                <div class="border-b border-slate-100 p-4">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex items-center gap-4">
                            <div class="bg-slate-900 text-white px-2 py-1 rounded text-[9px] font-black uppercase">${entry.scope}</div>
                            <div class="flex flex-col">
                                <span class="text-xs font-bold text-slate-700">${entry.details} Optimization</span>
                                <span class="text-[9px] text-slate-400">${entry.time}</span>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${entry.stats.map(s => `
                                <div class="bg-slate-50 border border-slate-100 px-2 py-1 rounded text-[9px] font-bold">
                                    <span class="text-slate-400">${s.name.split('-')[1]?.trim() || s.name}:</span>
                                    <span class="${parseFloat(s.balance) < 95 ? 'text-red-500' : 'text-slate-700'}">${s.balance}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // MODAL HANDLERS
        function openModal(id) {
            document.getElementById(id).classList.remove('hidden');
            if(id === 'member-modal') renderMemberList();
            if(id === 'team-modal') renderTeamEditor();
        }

        function closeModals() {
            document.querySelectorAll('[id$="-modal"]').forEach(m => m.classList.add('hidden'));
            saveData();
            renderGrid();
        }

        function renderMemberList() {
            const list = document.getElementById('member-list');
            document.getElementById('roster-count').textContent = `${techs.length} TOTAL STAFF`;
            list.innerHTML = [...techs].sort((a,b) => a.name.localeCompare(b.name)).map(m => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between">
                    <div>
                        <span class="block font-bold text-sm uppercase">${m.name}</span>
                        <span class="text-[9px] font-black text-slate-400 uppercase">ID: ${m.id} | ${m.shift}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="text-center">
                            <input type="number" value="${m.quality}" onchange="updateTechProp('${m.id}', 'quality', this.value)" class="w-10 border border-slate-100 rounded text-xs font-bold text-center">
                        </div>
                        <button onclick="removeTech('${m.id}')" class="text-slate-200 hover:text-red-500 ml-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderTeamEditor() {
            const list = document.getElementById('team-editor-list');
            list.innerHTML = teams.map(t => `
                <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl mb-2">
                    <input type="text" value="${t.name}" onchange="updateTeamProp('${t.id}', 'name', this.value)" class="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold">
                    <select onchange="updateTeamProp('${t.id}', 'shift', this.value)" class="bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold">
                        <option value="day" ${t.shift === 'day' ? 'selected' : ''}>Day</option>
                        <option value="night" ${t.shift === 'night' ? 'selected' : ''}>Night</option>
                    </select>
                    <button onclick="removeTeam('${t.id}')" class="text-slate-300 hover:text-red-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    </button>
                </div>
            `).join('');
        }

        // TOAST SYSTEM
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast px-5 py-4 rounded-2xl shadow-2xl border-l-4 text-sm font-bold bg-white ${type === 'success' ? 'border-green-500' : 'border-red-500'}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        // DATA UPDATERS
        function updateTechProp(id, prop, val) { const t = techs.find(x => x.id === id); if(t) { t[prop] = prop === 'name' ? val : (prop === 'shift' ? val : parseInt(val)); saveData(); } }
        function updateTeamProp(id, prop, val) { const t = teams.find(x => x.id === id); if(t) { t[prop] = val; saveData(); } }
        function setShuffleScope(s) { shuffleScope = s; ['all','day','night'].forEach(x => document.getElementById(`scope-${x}`).classList.toggle('bg-white', x === s)); }
        function addNewTech() { 
            const id = document.getElementById('new-tech-id').value.trim().toUpperCase();
            const name = document.getElementById('new-tech-name').value.trim();
            if(!id || !name) return;
            techs.push({ id, name, quality: 80, production: 100, shift: document.getElementById('new-tech-shift').value, pinned: false });
            saveData(); renderMemberList(); showToast("Tech Registered");
        }
        function removeTech(id) { techs = techs.filter(x => x.id !== id); saveData(); renderMemberList(); }
        function removeTeam(id) { if(teams.length > 1) { teams = teams.filter(x => x.id !== id); saveData(); renderTeamEditor(); } }
        function clearLog() { shuffleHistory = []; saveData(); renderLog(); }

        window.onload = init;
    </script>
</body>
</html>
