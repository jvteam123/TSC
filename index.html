<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProResume | Ultimate Professional Builder by Renzku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
        }
        
        /* PRINT STABILITY FIX */
        @media print {
            @page { size: A4; margin: 0; }
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            
            .resume-page { 
                box-shadow: none !important; 
                border: none !important; 
                width: 210mm !important; 
                height: 297mm !important;
                padding: 20mm !important;
                margin: 0 !important;
                position: absolute;
                top: 0;
                left: 0;
            }
            /* Prevent text scrambling/overlapping on export */
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }

        .resume-page {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            padding: 20mm;
            transition: transform 0.3s ease;
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Section Styling */
        .section-title {
            color: var(--theme-color, #6366f1);
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        #printModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #printModal.active { display: flex; }

        .drag-handle { cursor: grab; padding: 4px; }
        .drag-handle:active { cursor: grabbing; }
        .ghost { opacity: 0.2; background: #6366f1; border-radius: 1rem; }
        
        /* Editor Cards */
        .editor-card {
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .editor-card:hover {
            border-color: #cbd5e1;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center no-print shrink-0 z-10">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-100">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tight text-slate-800 uppercase leading-none">Pro<span class="text-indigo-600">Resume</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">by Renzku</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-slate-50 p-1.5 rounded-lg border border-slate-200">
                <input type="color" id="theme-color" value="#6366f1" oninput="updatePreview()" class="w-6 h-6 rounded-md cursor-pointer border-none bg-transparent">
            </div>
            <button onclick="showPrintModal()" class="bg-slate-900 hover:bg-black text-white px-5 py-2.5 rounded-xl font-bold text-sm transition-all flex items-center gap-2 shadow-xl shadow-slate-200 active:scale-95">
                Print / Download
            </button>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="flex flex-1 overflow-hidden">
        
        <!-- Editor Sidebar -->
        <aside class="w-[480px] border-r border-slate-200 bg-white overflow-y-auto custom-scroll no-print p-8 space-y-8 pb-32">
            <!-- Personal Info -->
            <div class="space-y-6">
                <div class="flex items-center gap-4 p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100">
                    <div class="relative group">
                        <div id="photo-preview" class="w-20 h-20 bg-white border-2 border-dashed border-indigo-200 rounded-2xl flex items-center justify-center overflow-hidden shadow-inner">
                            <span class="text-[10px] font-black text-indigo-300 uppercase">Photo</span>
                            <img id="profile-img" class="hidden absolute inset-0 w-full h-full object-cover">
                        </div>
                        <input type="file" onchange="handlePhoto(this)" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <div>
                        <p class="text-[10px] font-black uppercase text-indigo-900 tracking-wider">Profile Image</p>
                        <button onclick="removePhoto()" class="text-[10px] font-bold text-red-500 uppercase mt-1 hover:underline">Remove</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-5">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Full Name</label>
                        <input type="text" id="in-name" oninput="updatePreview()" placeholder="Alexander Pierce" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium outline-none focus:ring-4 ring-indigo-500/10 focus:bg-white transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Professional Title</label>
                        <input type="text" id="in-title" oninput="updatePreview()" placeholder="Senior Product Designer" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium outline-none focus:ring-4 ring-indigo-500/10 focus:bg-white transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Email</label>
                            <input type="text" id="in-email" oninput="updatePreview()" placeholder="alex@work.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-4 ring-indigo-500/10">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 block">Phone</label>
                            <input type="text" id="in-phone" oninput="updatePreview()" placeholder="+1 555 000" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:ring-4 ring-indigo-500/10">
                        </div>
                    </div>
                </div>
            </div>

            <hr class="border-slate-100">

            <!-- Draggable Sections List -->
            <div id="dynamic-sections" class="space-y-6">
                <!-- Sections rendered by JS -->
            </div>

            <!-- Add Section UI -->
            <div class="space-y-4">
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-200">
                    <p class="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-4 text-center">Suggested Sections</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="addSection('Objective', 'text')" class="px-4 py-3 bg-white border border-slate-200 rounded-xl text-[10px] font-bold uppercase tracking-wider text-slate-600 hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">🎯 Objective</button>
                        <button onclick="addSection('Experience', 'list')" class="px-4 py-3 bg-white border border-slate-200 rounded-xl text-[10px] font-bold uppercase tracking-wider text-slate-600 hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">💼 Experience</button>
                        <button onclick="addSection('Projects', 'list')" class="px-4 py-3 bg-white border border-slate-200 rounded-xl text-[10px] font-bold uppercase tracking-wider text-slate-600 hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">🚀 Projects</button>
                        <button onclick="addSection('Languages', 'tags')" class="px-4 py-3 bg-white border border-slate-200 rounded-xl text-[10px] font-bold uppercase tracking-wider text-slate-600 hover:border-indigo-500 hover:text-indigo-600 transition-all shadow-sm">🌐 Languages</button>
                    </div>
                    <button onclick="addSection('Custom Section', 'text')" class="w-full mt-4 py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                        + Create Blank Section
                    </button>
                </div>
            </div>
            
            <div class="pt-8 text-center opacity-40">
                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">Created by Renzku</p>
                <p class="text-[8px] font-bold text-slate-300 mt-1 uppercase">© 2024 ProResume Engine</p>
            </div>
        </aside>

        <!-- Preview Area -->
        <section class="flex-1 bg-slate-100 overflow-y-auto p-12 flex justify-center custom-scroll">
            <div id="resume-canvas" class="resume-page">
                <!-- Content Injected -->
            </div>
        </section>
    </main>

    <!-- Print Modal -->
    <div id="printModal" class="no-print">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-full text-center border border-slate-100">
            <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">Ready to Print</h2>
            <p class="text-slate-500 text-sm mb-8 leading-relaxed">Ensure <span class="font-bold text-slate-800">Background Graphics</span> is enabled in your browser print settings for the best results.</p>
            <div class="flex flex-col gap-3">
                <button onclick="window.print()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl shadow-indigo-200 active:scale-95 transition-all">Start Printing</button>
                <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold hover:bg-slate-200 transition-all">Dismiss</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            photo: '',
            sections: [
                { id: 'sec-1', title: 'Summary', type: 'text', content: 'Seasoned Product Designer with 5+ years of experience in creating user-centric digital products. Expert in translating complex business requirements into elegant, high-performance interfaces.' },
                { id: 'sec-2', title: 'Experience', type: 'list', items: [{ role: 'Senior Developer', org: 'Global Tech Inc.', date: '2020 - Present', desc: 'Led a cross-functional team of 10 developers to build scalable cloud solutions.' }] },
                { id: 'sec-3', title: 'Technical Stack', type: 'tags', content: 'JavaScript, React, Node.js, Project Leadership, Agile, SQL, AWS, Figma' }
            ]
        };

        // Initialize Sortable
        const sortableList = document.getElementById('dynamic-sections');
        new Sortable(sortableList, {
            animation: 250,
            handle: '.drag-handle',
            ghostClass: 'ghost',
            onEnd: function() {
                const newOrderIds = Array.from(sortableList.querySelectorAll('.editor-card')).map(el => el.dataset.id);
                const reorderedSections = newOrderIds.map(id => state.sections.find(s => s.id === id));
                state.sections = reorderedSections;
                updatePreview();
            }
        });

        function handlePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.photo = e.target.result;
                    const img = document.getElementById('profile-img');
                    img.src = state.photo;
                    img.classList.remove('hidden');
                    updatePreview();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removePhoto() {
            state.photo = '';
            document.getElementById('profile-img').classList.add('hidden');
            updatePreview();
        }

        function addSection(title = 'New Section', type = 'text') {
            const id = 'sec-' + Date.now();
            const newSection = { id, title, type, content: '' };
            if (type === 'list') newSection.items = [{ role: '', org: '', date: '', desc: '' }];
            
            state.sections.push(newSection);
            renderEditor();
            updatePreview();
        }

        function removeSection(id) {
            state.sections = state.sections.filter(s => s.id !== id);
            renderEditor();
            updatePreview();
        }

        function updateSection(id, key, value) {
            const sec = state.sections.find(s => s.id === id);
            sec[key] = value;
            updatePreview();
        }

        // Add item for list-type sections
        function addListItem(sid) {
            const sec = state.sections.find(s => s.id === sid);
            sec.items.push({ role: '', org: '', date: '', desc: '' });
            renderEditor();
            updatePreview();
        }

        function updateListItem(sid, idx, key, value) {
            state.sections.find(s => s.id === sid).items[idx][key] = value;
            updatePreview();
        }

        function renderEditor() {
            const container = document.getElementById('dynamic-sections');
            container.innerHTML = state.sections.map(s => `
                <div class="editor-card p-6 bg-white rounded-2xl border border-slate-200 shadow-sm relative group" data-id="${s.id}">
                    <div class="flex justify-between items-center mb-5">
                        <div class="flex items-center gap-3">
                            <div class="drag-handle text-slate-300 hover:text-indigo-400 transition-colors">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
                            </div>
                            <input type="text" value="${s.title}" oninput="updateSection('${s.id}', 'title', this.value)" class="bg-transparent font-black text-[10px] uppercase tracking-[0.2em] text-slate-800 outline-none w-full">
                        </div>
                        <button onclick="removeSection('${s.id}')" class="text-slate-300 hover:text-red-500 transition-colors text-xl font-light">×</button>
                    </div>
                    
                    ${s.type === 'text' ? `
                        <textarea oninput="updateSection('${s.id}', 'content', this.value)" class="w-full p-4 text-sm bg-slate-50 border border-slate-100 rounded-xl h-28 outline-none focus:ring-4 ring-indigo-500/5 focus:bg-white transition-all">${s.content}</textarea>
                    ` : s.type === 'tags' ? `
                        <input type="text" value="${s.content || ''}" oninput="updateSection('${s.id}', 'content', this.value)" placeholder="Separate items with commas..." class="w-full p-4 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none focus:bg-white transition-all">
                    ` : `
                        <div class="space-y-4">
                            ${s.items.map((item, idx) => `
                                <div class="p-4 bg-slate-50 rounded-xl border border-slate-100 space-y-3">
                                    <div class="grid grid-cols-2 gap-2">
                                        <input type="text" placeholder="Role" value="${item.role}" oninput="updateListItem('${s.id}', ${idx}, 'role', this.value)" class="p-2 text-xs font-bold rounded-lg border-none bg-white">
                                        <input type="text" placeholder="Date" value="${item.date}" oninput="updateListItem('${s.id}', ${idx}, 'date', this.value)" class="p-2 text-xs rounded-lg border-none bg-white">
                                    </div>
                                    <input type="text" placeholder="Organization" value="${item.org}" oninput="updateListItem('${s.id}', ${idx}, 'org', this.value)" class="w-full p-2 text-xs rounded-lg border-none bg-white">
                                    <textarea placeholder="Description" oninput="updateListItem('${s.id}', ${idx}, 'desc', this.value)" class="w-full p-2 text-xs rounded-lg border-none bg-white h-16">${item.desc}</textarea>
                                </div>
                            `).join('')}
                            <button onclick="addListItem('${s.id}')" class="text-[9px] font-black uppercase text-indigo-600 tracking-widest">+ Add Entry</button>
                        </div>
                    `}
                </div>
            `).join('');
        }

        function updatePreview() {
            const color = document.getElementById('theme-color').value;
            document.documentElement.style.setProperty('--theme-color', color);
            
            const canvas = document.getElementById('resume-canvas');
            const name = (document.getElementById('in-name').value || "YOUR NAME").toUpperCase();
            const title = (document.getElementById('in-title').value || "PROFESSIONAL TITLE").toUpperCase();
            const email = document.getElementById('in-email').value || "email@work.com";
            const phone = document.getElementById('in-phone').value || "123-456-7890";

            let html = `
                <header class="flex justify-between items-start gap-10 mb-12">
                    <div class="flex-1">
                        <h1 class="text-6xl font-black text-slate-900 tracking-tighter leading-none mb-3">${name}</h1>
                        <p class="text-xl font-bold tracking-[0.25em] uppercase mb-8" style="color: ${color}">${title}</p>
                        <div class="flex gap-6 text-[11px] font-black text-slate-400 uppercase tracking-[0.15em]">
                            <div class="flex items-center gap-2">
                                <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
                                <span>${email}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 004.812 4.812l.774-1.548a1 1 0 011.06-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"/></svg>
                                <span>${phone}</span>
                            </div>
                        </div>
                    </div>
                    ${state.photo ? `<div class="p-1.5 bg-white shadow-2xl rounded-2xl border border-slate-50 rotate-2 shrink-0"><img src="${state.photo}" class="w-32 h-32 object-cover rounded-xl"></div>` : ''}
                </header>
                <div class="space-y-10">
            `;

            state.sections.forEach(s => {
                let contentHtml = '';
                
                if (s.type === 'text' && s.content.trim()) {
                    contentHtml = `<p class="text-[13px] leading-relaxed text-slate-600 whitespace-pre-line">${s.content}</p>`;
                } else if (s.type === 'tags' && s.content.trim()) {
                    const tags = s.content.split(',').map(t => t.trim()).filter(t => t);
                    contentHtml = `<div class="flex flex-wrap gap-2">${tags.map(t => `<span class="px-2.5 py-1 bg-slate-50 border border-slate-100 rounded text-[10px] font-black text-slate-500 uppercase tracking-wider">${t}</span>`).join('')}</div>`;
                } else if (s.type === 'list') {
                    contentHtml = s.items.map(i => {
                        if (!i.role && !i.org) return '';
                        return `
                        <div class="mb-6 last:mb-0">
                            <div class="flex justify-between items-baseline mb-1">
                                <h5 class="text-[15px] font-black text-slate-900 leading-tight">${i.role}</h5>
                                <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest shrink-0 ml-4">${i.date}</span>
                            </div>
                            <div class="text-[11px] font-black uppercase tracking-wider mb-2" style="color: ${color}">${i.org}</div>
                            <p class="text-[13px] text-slate-600 leading-relaxed whitespace-pre-line">${i.desc}</p>
                        </div>
                    `}).join('');
                }

                if (contentHtml) {
                    html += `<section>
                        <div class="section-title" style="color: ${color}">${s.title}</div>
                        ${contentHtml}
                    </section>`;
                }
            });

            html += `</div>`;
            canvas.innerHTML = html;
        }

        function showPrintModal() { document.getElementById('printModal').classList.add('active'); }
        function closeModal() { document.getElementById('printModal').classList.remove('active'); }

        renderEditor();
        updatePreview();
    </script>
</body>
</html>
