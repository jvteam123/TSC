<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProResume | Modern Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --theme-color: #4f46e5; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; overflow: hidden; height: 100vh; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Preview Canvas Styling */
        #resume-canvas {
            width: 794px; /* A4 Ratio approx */
            min-height: 1123px;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            margin: 2rem auto;
            transform-origin: top center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Device Toggle Styles */
        .preview-mobile #resume-canvas {
            width: 375px;
            min-height: 667px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .section-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .section-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; overflow: visible; }
            #resume-canvas { 
                transform: scale(1) !important; 
                box-shadow: none !important; 
                margin: 0 !important;
                width: 100% !important;
            }
        }

        /* Animation for view switching */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Top Navigation Bar -->
    <header class="no-print h-16 border-b bg-white flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-indigo-200">P</div>
            <h1 class="text-xl font-extrabold tracking-tight text-slate-900">ProResume <span class="text-indigo-600">v2.0</span></h1>
        </div>

        <div class="flex items-center gap-4">
            <!-- View Mode Switcher -->
            <div class="bg-slate-100 p-1 rounded-lg flex items-center gap-1 border border-slate-200">
                <button id="view-desktop" onclick="setViewMode('desktop')" class="px-3 py-1.5 rounded-md text-xs font-semibold transition-all bg-white shadow-sm text-indigo-600">
                    Desktop
                </button>
                <button id="view-mobile" onclick="setViewMode('mobile')" class="px-3 py-1.5 rounded-md text-xs font-semibold transition-all text-slate-500 hover:text-slate-800">
                    Mobile
                </button>
            </div>

            <div class="h-6 w-px bg-slate-200"></div>

            <button onclick="resetData()" class="text-slate-500 hover:text-red-600 px-3 py-2 rounded-lg text-sm font-medium transition-colors">
                Reset
            </button>
            <button onclick="showPrintModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md shadow-indigo-100 transition-all active:scale-95">
                Export / Print
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar Navigation -->
        <aside class="no-print w-20 border-r bg-white flex flex-col items-center py-6 gap-6">
            <button onclick="switchTab('content')" id="tab-btn-content" class="tab-btn active w-12 h-12 rounded-xl flex items-center justify-center text-indigo-600 bg-indigo-50 border-2 border-indigo-100 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
            </button>
            <button onclick="switchTab('design')" id="tab-btn-design" class="tab-btn w-12 h-12 rounded-xl flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:bg-slate-50 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.172-1.172a4 4 0 115.656 5.656L10 17.657" /></svg>
            </button>
        </aside>

        <!-- Editor Pane -->
        <section id="editor-pane" class="no-print w-[450px] bg-slate-50 border-r flex flex-col h-full fade-in">
            <div id="content-tab" class="flex-1 flex flex-col overflow-hidden">
                <div class="p-6 pb-2">
                    <h2 class="text-lg font-bold text-slate-800">Content Editor</h2>
                    <p class="text-sm text-slate-500 mb-4">Draft your career details here.</p>
                </div>
                
                <div id="editor-sections" class="flex-1 overflow-y-auto px-6 pb-12 space-y-4">
                    <!-- Dynamic form sections injected here -->
                </div>
            </div>

            <div id="design-tab" class="hidden flex-1 p-6 overflow-y-auto">
                <h2 class="text-lg font-bold text-slate-800 mb-2">Design & Theme</h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Accent Color</label>
                        <div class="grid grid-cols-5 gap-3">
                            <button onclick="setAccent('#4f46e5')" class="w-full aspect-square rounded-lg bg-indigo-600 ring-2 ring-offset-2 ring-indigo-600"></button>
                            <button onclick="setAccent('#10b981')" class="w-full aspect-square rounded-lg bg-emerald-500"></button>
                            <button onclick="setAccent('#f59e0b')" class="w-full aspect-square rounded-lg bg-amber-500"></button>
                            <button onclick="setAccent('#ef4444')" class="w-full aspect-square rounded-lg bg-red-500"></button>
                            <button onclick="setAccent('#0f172a')" class="w-full aspect-square rounded-lg bg-slate-900"></button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Preview Pane -->
        <section id="preview-pane" class="flex-1 bg-slate-200 overflow-y-auto relative scroll-smooth flex justify-center">
            <div id="resume-canvas-container" class="relative w-full h-fit flex justify-center p-8 transition-all">
                <div id="resume-canvas" class="p-[50px] text-slate-800 overflow-hidden">
                    <!-- Resume Content Injected Here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div id="printModal" class="no-print fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden animate-in zoom-in duration-200">
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                </div>
                <h3 class="text-xl font-bold text-slate-900">Ready to Print?</h3>
                <p class="text-slate-500 mt-2 mb-8">Save your resume as a PDF. Make sure "Background Graphics" is enabled in your print settings.</p>
                <div class="flex flex-col gap-3">
                    <button onclick="window.print()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-indigo-700 transition-all">Open Print Menu</button>
                    <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-all">Back to Editor</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & STATE ---
        const DB_NAME = "ProResume_DB_v2";
        const STORE_NAME = "user_resume_data";
        let state = {
            id: 'resume-1',
            theme: '#4f46e5',
            personal: { name: 'Alex Johnson', title: 'Senior Product Designer', email: 'alex@example.com', phone: '+1 555 0123', location: 'New York, NY', website: 'alex.design' },
            summary: "Creative product designer with over 8 years of experience building human-centered digital experiences. Specialist in design systems and accessible UI components.",
            sections: [
                { id: 'exp', title: 'Work Experience', type: 'list', items: [
                    { primary: 'Lead Designer', secondary: 'TechFlow Inc.', date: '2020 - Present', desc: 'Leading a team of 12 designers across mobile and web platforms.' },
                    { primary: 'UI Designer', secondary: 'Creative Labs', date: '2016 - 2020', desc: 'Spearheaded the redesign of the core dashboard, increasing engagement by 40%.' }
                ]},
                { id: 'skills', title: 'Skills', type: 'tags', items: ['Figma', 'React', 'TypeScript', 'Tailwind CSS', 'User Research', 'Motion Design'] }
            ]
        };

        let activeTab = 'content';
        let viewMode = 'desktop';

        // --- DATABASE HANDLING ---
        function initDB() {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: "id" });
            };
            request.onsuccess = (e) => {
                const db = e.target.result;
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const getReq = store.get('resume-1');
                getReq.onsuccess = () => {
                    if(getReq.result) {
                        state = getReq.result;
                    }
                    startApp();
                };
            };
        }

        function saveToDB() {
            const request = indexedDB.open(DB_NAME, 1);
            request.onsuccess = (e) => {
                const db = e.target.result;
                const tx = db.transaction(STORE_NAME, "readwrite");
                tx.objectStore(STORE_NAME).put(JSON.parse(JSON.stringify(state)));
            };
        }

        // --- CORE UI LOGIC ---
        function startApp() {
            renderEditor();
            updatePreview();
            handleResize();
            window.addEventListener('resize', handleResize);
        }

        function setViewMode(mode) {
            viewMode = mode;
            const container = document.getElementById('preview-pane');
            const dBtn = document.getElementById('view-desktop');
            const mBtn = document.getElementById('view-mobile');

            if (mode === 'mobile') {
                container.classList.add('preview-mobile');
                mBtn.classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
                mBtn.classList.remove('text-slate-500');
                dBtn.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600');
                dBtn.classList.add('text-slate-500');
            } else {
                container.classList.remove('preview-mobile');
                dBtn.classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
                dBtn.classList.remove('text-slate-500');
                mBtn.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600');
                mBtn.classList.add('text-slate-500');
            }
            handleResize();
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-50', 'text-indigo-600', 'border-indigo-100');
                btn.classList.add('text-slate-400');
            });
            document.getElementById(`tab-btn-${tab}`).classList.add('bg-indigo-50', 'text-indigo-600', 'border-indigo-100');
            
            document.getElementById('content-tab').classList.toggle('hidden', tab !== 'content');
            document.getElementById('design-tab').classList.toggle('hidden', tab !== 'design');
        }

        function renderEditor() {
            const container = document.getElementById('editor-sections');
            container.innerHTML = '';

            // Personal Info
            container.innerHTML += `
                <div class="bg-white rounded-xl p-5 border border-slate-200 section-card">
                    <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
                        Basics
                    </h3>
                    <div class="space-y-3">
                        <input type="text" value="${state.personal.name}" oninput="updateBasics('name', this.value)" placeholder="Full Name" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <input type="text" value="${state.personal.title}" oninput="updateBasics('title', this.value)" placeholder="Job Title" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" value="${state.personal.email}" oninput="updateBasics('email', this.value)" placeholder="Email" class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            <input type="text" value="${state.personal.phone}" oninput="updateBasics('phone', this.value)" placeholder="Phone" class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                </div>
            `;

            // Sections
            state.sections.forEach((sec, idx) => {
                const sectionHTML = `
                    <div class="bg-white rounded-xl p-5 border border-slate-200 section-card" data-id="${sec.id}">
                        <div class="flex justify-between items-center mb-4">
                            <input type="text" value="${sec.title}" oninput="updateSectionTitle(${idx}, this.value)" class="font-bold text-slate-700 bg-transparent border-none outline-none focus:ring-0">
                            <button onclick="removeSection(${idx})" class="text-slate-300 hover:text-red-500 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                        <div class="space-y-4">
                            ${sec.items.map((item, iIdx) => renderItemEditor(idx, iIdx, sec.type)).join('')}
                        </div>
                        <button onclick="addItem(${idx})" class="mt-4 w-full py-2 border-2 border-dashed border-slate-100 text-slate-400 rounded-lg text-xs font-bold hover:bg-slate-50 hover:border-slate-200 transition-all">+ Add Item</button>
                    </div>
                `;
                container.innerHTML += sectionHTML;
            });

            // Add New Section Button
            container.innerHTML += `
                <button onclick="addNewSection()" class="w-full py-4 bg-white border-2 border-dashed border-slate-200 rounded-xl text-slate-400 font-bold hover:bg-white hover:border-indigo-300 hover:text-indigo-600 transition-all">
                    Add New Section Block
                </button>
            `;
        }

        function renderItemEditor(sIdx, iIdx, type) {
            const item = state.sections[sIdx].items[iIdx];
            if(type === 'tags') {
                return `<input type="text" value="${item}" oninput="updateItem(${sIdx}, ${iIdx}, 'tags', this.value)" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm mb-2">`;
            }
            return `
                <div class="p-3 bg-slate-50 rounded-lg border border-slate-100 space-y-2">
                    <input type="text" value="${item.primary}" placeholder="Title" oninput="updateItem(${sIdx}, ${iIdx}, 'primary', this.value)" class="w-full bg-transparent text-sm font-semibold outline-none">
                    <input type="text" value="${item.secondary}" placeholder="Subtitle" oninput="updateItem(${sIdx}, ${iIdx}, 'secondary', this.value)" class="w-full bg-transparent text-xs outline-none text-slate-500">
                    <textarea oninput="updateItem(${sIdx}, ${iIdx}, 'desc', this.value)" class="w-full bg-transparent text-xs text-slate-600 outline-none resize-none" placeholder="Description...">${item.desc}</textarea>
                </div>
            `;
        }

        // --- UPDATES ---
        function updateBasics(key, val) {
            state.personal[key] = val;
            updatePreview();
            saveToDB();
        }

        function updateSectionTitle(idx, val) {
            state.sections[idx].title = val;
            updatePreview();
            saveToDB();
        }

        function updateItem(sIdx, iIdx, key, val) {
            if(state.sections[sIdx].type === 'tags') {
                state.sections[sIdx].items[iIdx] = val;
            } else {
                state.sections[sIdx].items[iIdx][key] = val;
            }
            updatePreview();
            saveToDB();
        }

        function addItem(idx) {
            const sec = state.sections[idx];
            if(sec.type === 'tags') sec.items.push('New Skill');
            else sec.items.push({ primary: 'Job Title', secondary: 'Company', date: '2024', desc: 'Description...' });
            renderEditor();
            updatePreview();
        }

        function removeSection(idx) {
            state.sections.splice(idx, 1);
            renderEditor();
            updatePreview();
        }

        function addNewSection() {
            state.sections.push({ id: Date.now(), title: 'New Section', type: 'list', items: [] });
            renderEditor();
        }

        function setAccent(color) {
            state.theme = color;
            document.documentElement.style.setProperty('--theme-color', color);
            updatePreview();
            saveToDB();
        }

        // --- PREVIEW RENDER ---
        function updatePreview() {
            const canvas = document.getElementById('resume-canvas');
            canvas.innerHTML = `
                <header class="mb-10 flex justify-between items-start border-b-2 pb-8" style="border-color: ${state.theme}20">
                    <div>
                        <h1 class="text-4xl font-extrabold tracking-tight mb-1" style="color: ${state.theme}">${state.personal.name}</h1>
                        <p class="text-xl text-slate-500 font-medium">${state.personal.title}</p>
                    </div>
                    <div class="text-right text-xs space-y-1 font-medium text-slate-600">
                        <p>${state.personal.email}</p>
                        <p>${state.personal.phone}</p>
                        <p>${state.personal.location}</p>
                        <p class="text-indigo-600">${state.personal.website}</p>
                    </div>
                </header>

                <div class="mb-10">
                    <h2 class="text-sm font-black uppercase tracking-[0.2em] mb-3" style="color: ${state.theme}">Profile</h2>
                    <p class="text-sm leading-relaxed text-slate-600">${state.summary}</p>
                </div>

                <div class="space-y-10">
                    ${state.sections.map(sec => `
                        <div>
                            <h2 class="text-sm font-black uppercase tracking-[0.2em] mb-4 flex items-center gap-3" style="color: ${state.theme}">
                                ${sec.title}
                                <div class="flex-1 h-px bg-slate-100"></div>
                            </h2>
                            <div class="${sec.type === 'tags' ? 'flex flex-wrap gap-2' : 'space-y-6'}">
                                ${sec.items.map(item => renderPreviewItem(item, sec.type)).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            handleResize();
        }

        function renderPreviewItem(item, type) {
            if(type === 'tags') {
                return `<span class="px-3 py-1 bg-slate-100 text-slate-700 text-xs font-bold rounded-full border border-slate-200">${item}</span>`;
            }
            return `
                <div class="relative pl-0">
                    <div class="flex justify-between items-baseline mb-1">
                        <h3 class="font-bold text-slate-900">${item.primary}</h3>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${item.date || ''}</span>
                    </div>
                    <p class="text-sm font-semibold text-indigo-600 mb-2">${item.secondary}</p>
                    <p class="text-xs leading-relaxed text-slate-500">${item.desc}</p>
                </div>
            `;
        }

        function handleResize() {
            const container = document.getElementById('resume-canvas-container');
            const canvas = document.getElementById('resume-canvas');
            if(!container || !canvas) return;

            const padding = 64; // 32px each side
            const availableWidth = container.offsetWidth - padding;
            const targetWidth = viewMode === 'mobile' ? 375 : 794;
            
            const scale = availableWidth / targetWidth;
            
            // Only scale down if necessary
            if (scale < 1) {
                canvas.style.transform = `scale(${scale})`;
            } else if (viewMode === 'mobile') {
                canvas.style.transform = `scale(1)`;
            } else {
                // For desktop, we might want a slightly bigger scale on high-res monitors
                const desktopScale = Math.min(1.2, scale);
                canvas.style.transform = `scale(${desktopScale})`;
            }
        }

        function resetData() {
            if(confirm("Are you sure? This will reset all your changes.")) {
                state = {
                    id: 'resume-1',
                    theme: '#4f46e5',
                    personal: { name: 'New User', title: 'Designation', email: '', phone: '', location: '', website: '' },
                    summary: "Your career summary goes here...",
                    sections: []
                };
                renderEditor();
                updatePreview();
                saveToDB();
            }
        }

        function showPrintModal() { document.getElementById('printModal').classList.remove('hidden'); document.getElementById('printModal').classList.add('flex'); }
        function closeModal() { document.getElementById('printModal').classList.add('hidden'); document.getElementById('printModal').classList.remove('flex'); }

        // Start initialization
        initDB();
    </script>
</body>
</html>
